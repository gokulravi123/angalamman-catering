<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Angalamman Catering Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f97316;
            --primary-dark: #ea580c;
            --bg-body: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #334155;
            --text-heading: #0f172a;
            --text-muted: #64748b;
            --sidebar-width: 260px;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; min-height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: #1e293b;
            color: white;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 3rem; display: flex; align-items: center; gap: 0.5rem; }
        .logo span { color: var(--primary); }

        .nav-item {
            padding: 0.8rem 1rem;
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
            color: #94a3b8;
            text-decoration: none;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: var(--primary); color: white; }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 2rem 3rem;
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; }
        h1 { font-size: 1.8rem; color: var(--text-heading); }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
        }
        .stat-card .label { color: var(--text-muted); font-size: 0.85rem; font-weight: 500; display: block; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 1.8rem; font-weight: 700; color: var(--text-heading); }
        .stat-card .trend { font-size: 0.8rem; color: #10b981; margin-top: 0.5rem; display: flex; align-items: center; gap: 0.2rem; }

        /* Search & Actions */
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .search-box {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.6rem 1rem;
            border-radius: var(--radius);
            width: 300px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .search-box input { border: none; outline: none; width: 100%; font-family: inherit; font-size: 0.9rem; }

        .refresh-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.6rem 1.2rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .refresh-btn:hover { background: #f8fafc; border-color: var(--primary); color: var(--primary); }

        /* Orders Container */
        .orders-container { display: flex; flex-direction: column; gap: 1rem; }

        .order-row {
            background: white;
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid #e2e8f0;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr auto;
            align-items: center;
            gap: 1.5rem;
            transition: 0.2s;
        }
        .order-row:hover { border-color: var(--primary); transform: translateX(5px); }

        .cust-info .name { font-weight: 600; color: var(--text-heading); display: block; }
        .cust-info .phone { font-size: 0.85rem; color: var(--text-muted); }

        .event-info .type { font-weight: 500; display: block; }
        .event-info .date { font-size: 0.85rem; color: var(--text-muted); }

        .amount-info .total { font-weight: 700; color: var(--primary); display: block; }
        .amount-info .count { font-size: 0.85rem; color: var(--text-muted); }

        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-pending { background: #fff7ed; color: #f97316; }
        .badge-confirmed { background: #f0fdf4; color: #10b981; }

        .view-details {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
        }

        /* Modal for Detail View */
        .detail-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        .detail-modal.active { display: flex; }
        .modal-content {
            background: white;
            width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: var(--radius);
            padding: 2.5rem;
            position: relative;
        }
        .close-modal { position: absolute; top: 1.5rem; right: 1.5rem; cursor: pointer; font-size: 1.5rem; }

        .items-list { margin-top: 1.5rem; background: #f8fafc; padding: 1.5rem; border-radius: 8px; }
        .item-line { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.9rem; border-bottom: 1px dashed #e2e8f0; padding-bottom: 0.5rem; }

        .no-data { text-align: center; padding: 5rem; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Angalamman<span>.</span>Admin</div>
        <a href="#" class="nav-item active">📊 Dashboard</a>
        <a href="#" class="nav-item">📋 All Orders</a>
        <a href="#" class="nav-item">👥 Customers</a>
        <a href="#" class="nav-item">⚙ Settings</a>
    </div>

    <div class="main-content">
        <header>
            <h1>Catering Dashboard</h1>
            <div style="display: flex; gap: 1rem;">
                <button class="refresh-btn" onclick="fetchOrders()">🔄 Refresh</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Total Orders</span>
                <div class="value" id="stat-total">0</div>
                <div class="trend">↑ 12% from last week</div>
            </div>
            <div class="stat-card">
                <span class="label">Total Revenue</span>
                <div class="value" id="stat-revenue">₹0</div>
                <div class="trend">↑ 8% from last week</div>
            </div>
            <div class="stat-card">
                <span class="label">Upcoming Events</span>
                <div class="value" id="stat-upcoming">0</div>
                <div class="trend">Next: Tomorrow</div>
            </div>
        </div>

        <div class="actions-bar">
            <div class="search-box">
                🔍 <input type="text" id="searchInput" placeholder="Search by name or phone..." onkeyup="filterOrders()">
            </div>
            <div style="color: var(--text-muted); font-size: 0.9rem;">
                Showing <span id="visible-count">0</span> orders
            </div>
        </div>

        <div id="orders-list" class="orders-container">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="detail-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="margin-bottom: 0.5rem;">Order Details</h2>
            <p id="modal-subtitle" style="color: var(--text-muted); margin-bottom: 2rem;"></p>
            
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        let allOrders = [];

        async function fetchOrders() {
            try {
                const response = await fetch('http://localhost:3000/api/orders');
                allOrders = await response.json();
                updateStats();
                renderOrders(allOrders);
            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('orders-list').innerHTML = '<div class="no-data">Could not connect to server. Ensure backend is running.</div>';
            }
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = allOrders.length;
            
            let totalRevenue = 0;
            allOrders.forEach(o => {
                const val = parseFloat(o.total.replace(/[^0-9.]/g, ''));
                if(!isNaN(val)) totalRevenue += val;
            });
            document.getElementById('stat-revenue').innerText = '₹' + totalRevenue.toLocaleString();
            
            document.getElementById('stat-upcoming').innerText = allOrders.filter(o => new Date(o.eventDate) >= new Date()).length;
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-list');
            document.getElementById('visible-count').innerText = orders.length;

            if (orders.length === 0) {
                container.innerHTML = '<div class="no-data">No orders found.</div>';
                return;
            }

            container.innerHTML = orders.slice().reverse().map(order => `
                <div class="order-row">
                    <div class="cust-info">
                        <span class="name">${order.fullName}</span>
                        <span class="phone">${order.phone}</span>
                    </div>
                    <div class="event-info">
                        <span class="type">${order.eventType.charAt(0).toUpperCase() + order.eventType.slice(1)}</span>
                        <span class="date">${order.eventDate} @ ${order.eventTime}</span>
                    </div>
                    <div class="amount-info">
                        <span class="total">${order.total}</span>
                        <span class="count">${order.guestCount} Guests</span>
                    </div>
                    <div>
                        <span class="badge badge-pending">New Order</span>
                    </div>
                    <div>
                        <button class="view-details" onclick="viewDetails('${order.id}')">View</button>
                    </div>
                </div>
            `).join('');
        }

        function filterOrders() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allOrders.filter(o => 
                o.fullName.toLowerCase().includes(query) || 
                o.phone.includes(query)
            );
            renderOrders(filtered);
        }

        function viewDetails(id) {
            const order = allOrders.find(o => o.id === id);
            if(!order) return;

            document.getElementById('modal-title').innerText = order.fullName;
            document.getElementById('modal-subtitle').innerText = `Order ID: ${order.id} | Date: ${new Date(order.createdAt).toLocaleDateString()}`;
            
            document.getElementById('modal-body').innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
                    <div>
                        <span style="font-size: 0.8rem; color: #64748b; text-transform: uppercase;">Event Details</span>
                        <p style="font-weight: 600;">${order.eventType.toUpperCase()}</p>
                        <p>${order.eventDate} at ${order.eventTime}</p>
                        <p>${order.guestCount} Guests</p>
                    </div>
                    <div>
                        <span style="font-size: 0.8rem; color: #64748b; text-transform: uppercase;">Delivery Address</span>
                        <p>${order.address}</p>
                    </div>
                </div>
                <div class="items-list">
                    <h4 style="margin-bottom: 1rem;">Selected Menu</h4>
                    ${order.items.map(item => `
                        <div class="item-line">
                            <span>${item.name} <span style="color: #94a3b8;">x ${item.qty}</span></span>
                            <span style="font-weight: 600;">₹${(item.price * item.qty).toFixed(2)}</span>
                        </div>
                    `).join('')}
                    <div style="margin-top: 1rem; text-align: right; font-weight: 700; font-size: 1.2rem; color: var(--primary);">
                        Total: ${order.total}
                    </div>
                </div>
                <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                    <button class="refresh-btn" style="flex: 1; background: var(--primary); color: white; border: none;">Confirm Order</button>
                    <button class="refresh-btn" style="flex: 1;" onclick="closeModal()">Close</button>
                </div>
            `;

            document.getElementById('detail-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detail-modal').classList.remove('active');
        }

        fetchOrders();
    </script>
</body>
</html>
